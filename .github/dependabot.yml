# Dependabot - Auto-update dependencies
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    timezone: "America/Sao_Paulo"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    timezone: "America/Sao_Paulo"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    timezone: "America/Sao_Paulo"