# Pre-commit hooks for DevSecOps
repos:
  # Gitleaks - detect secrets before commit
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  # Bandit - Python SAST
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-f", "json"]