apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: visit-counter-network-policy
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: visit-counter
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: visit-counter
    ports:
    - protocol: TCP
      port: 5000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: visit-counter
    ports:
    - protocol: TCP
      port: 5000
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53